exchange_rates:
    path: /api/exchange-rates
    controller: App\Controller\ExchangeRateController::getCurrentRates
    methods: [GET]

exchange_rates_history:
    path: /api/exchange-rates/history
    controller: App\Controller\ExchangeRateController::getHistoricalRates
    methods: [GET]

exchange_rates_supported:
    path: /api/exchange-rates/supported
    controller: App\Controller\ExchangeRateController::getSupportedCurrencies
    methods: [GET]

index:
    path: /{wildcard}
    defaults: {
        _controller: App\Controller\DefaultController::index
    }
    requirements:
        wildcard: .*

